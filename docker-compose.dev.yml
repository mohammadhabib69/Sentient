# Development overrides for local Sentient infrastructure.
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
