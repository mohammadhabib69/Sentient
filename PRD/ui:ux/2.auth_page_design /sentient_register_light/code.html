                    "inverse-surface": "#e2e3e0",

                    "primary-container": "#75969c",
                    "glass-fill": "rgba(255, 255, 255, 0.6)", // Light glass
                    "on-surface": "#1e201f", // Adjusted
                    "secondary": "#a0d0c2",
                    "tertiary-fixed-dim": "#b8cbbd",
                    "amber-alert": "#D4874A",
                    "on-primary-fixed-variant": "#2b4c51",
                    "surface-tint": "#aaccd3",
                    "inverse-on-surface": "#2f3130",
                    "surface-dim": "#eaecea", // Adjusted
                    "surface-container-lowest": "#ffffff", // Adjusted
                    "on-primary-container": "#0a2e33",
                    "tertiary-fixed": "#d4e7d9",
                    "on-primary": "#ffffff", // Adjusted

                    "error-container": "#93000a",

                    "surface-container-high": "#ebeceb", // Adjusted
                    "glass-border": "rgba(0, 0, 0, 0.1)", // Light glass border
                    "on-secondary": "#02382e",
                    "deep-forest": "#2C3D33",

                    "background": "#F5F7F6", // Light background
                    "mist-teal": "#74959B",

            },
            "borderRadius": {

            "spacing": {

                    "lg": "1.5rem",

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .glass-panel {
            background: theme('colors.glass-fill');
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid theme('colors.glass-border');
        }

        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(77, 122, 128, 0.08) 0%, rgba(245, 247, 246, 0) 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
        }
        
        .form-input {
            background-color: theme('colors.surface');
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface');
            transition: all 0.2s ease-in-out;
        }
        
        .form-input:focus {
            outline: none;
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px rgba(77, 122, 128, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter relative overflow-hidden font-body-md antialiased">
<div class="ambient-glow"></div>
<div class="w-full max-w-md z-10">
<!-- Logo Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-2xl text-headline-2xl text-on-surface tracking-tighter mb-2">Sentient</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create your agent workspace.</p>
</div>
<!-- Registration Card -->
<div class="glass-panel rounded-xl p-lg shadow-[0_8px_32px_rgba(0,0,0,0.04)] relative overflow-hidden">
<!-- Top Border Accent -->
<div class="absolute top-0 left-0 w-full h-[3px] bg-primary"></div>
<form class="space-y-md">
<!-- Google SSO -->
<button class="w-full flex items-center justify-center gap-sm bg-surface hover:bg-surface-variant text-on-surface border border-outline-variant rounded-lg py-sm px-md transition-colors duration-200" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md text-body-md font-medium">Continue with Google</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-mono-xs text-mono-xs text-on-surface-variant uppercase tracking-wider">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Input: Full Name -->
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="person">person</span>
<input class="form-input w-full rounded-lg py-sm pl-10 pr-md font-body-md text-body-md placeholder:text-outline" id="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Input: Work Email -->
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface" for="workEmail">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="mail">mail</span>
<input class="form-input w-full rounded-lg py-sm pl-10 pr-md font-body-md text-body-md placeholder:text-outline" id="workEmail" placeholder="jane@company.com" required="" type="email"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-xs">
<label class="block font-label-caps text-label-caps text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
<input class="form-input w-full rounded-lg py-sm pl-10 pr-md font-body-md text-body-md placeholder:text-outline" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm pt-xs">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface" id="terms" required="" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-forest-green hover:bg-secondary-container text-on-primary font-body-md text-body-md font-medium rounded-lg py-sm px-md transition-colors duration-200 mt-md shadow-sm" type="submit">
                    Create Account
                </button>
</form>
</div>
<!-- Sign In Link -->
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-lg">
            Already have an account? <a class="text-primary font-medium hover:underline transition-colors" href="#">Sign in</a>
</p>
</div>
</body></html>
