<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sentient - Forgot Password</title>

                        "on-tertiary-container": "#1d2d24",
                        "tertiary-container": "#829589",

                        "on-surface-variant": "#414849", // Adjusted for light mode
                        "surface-container-highest": "#e2e3e0", // Adjusted for light mode
                        "on-secondary-fixed": "#00201a",
                        "primary-fixed-dim": "#aaccd3",

                        "inverse-surface": "#e2e3e0",

                        "primary-container": "#75969c",
                        "glass-fill": "rgba(255, 255, 255, 0.7)", // Adjusted for light mode
                        "on-surface": "#1E201F", // Adjusted for light mode typography
                        "secondary": "#a0d0c2",
                        "tertiary-fixed-dim": "#b8cbbd",
                        "amber-alert": "#D4874A",
                        "on-primary-fixed-variant": "#2b4c51",
                        "surface-tint": "#aaccd3",

                        "surface-dim": "#f5f7f6", // Adjusted for light mode

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .glass-panel {
            background: theme('colors.glass-fill');
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid theme('colors.glass-border');
        }
        .input-field {
            background-color: theme('colors.surface-container-lowest');
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface');
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px rgba(77, 122, 128, 0.2);
            outline: none;
        }
        .input-field::placeholder {
            color: theme('colors.on-surface-variant');
            opacity: 0.7;
        }
        .primary-btn {
            background-color: theme('colors.forest-green');
            color: theme('colors.on-primary');
            transition: all 0.2s ease;
        }
        .primary-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter relative overflow-hidden font-body-md">
<!-- Atmospheric Background (Light Mode Adapted) -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-tertiary blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-md z-10 relative">
<!-- Header -->
<header class="text-center mb-8">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-2 tracking-tight">Sentient</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Intelligence Engine</p>
</header>
<!-- Glass Card -->
<div class="glass-panel rounded-xl p-8 shadow-[0_8px_32px_rgba(0,0,0,0.05)]">
<!-- Context Icon -->
<div class="flex justify-center mb-6">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-size: 24px;">lock_reset</span>
</div>
</div>
<!-- Title & Description -->
<div class="text-center mb-8">
<h2 class="font-headline-2xl text-headline-2xl text-on-surface mb-3">Forgot Password</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Enter your email address and we'll send you a link to securely reset your password.
                </p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface block" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">mail</span>
</div>
<input class="input-field w-full pl-10 pr-4 py-3 rounded-lg font-body-md text-body-md" id="email" name="email" placeholder="operative@sentient.ai" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="primary-btn w-full py-3 rounded-lg font-body-lg text-body-lg flex justify-center items-center gap-2" type="submit">
                    Send Reset Link
                    <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
</form>
<!-- Back to Login Link -->
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-1 font-body-sm text-body-sm text-primary hover:text-forest-green transition-colors" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
                    Back to login
                </a>
</div>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center">
<p class="font-mono-xs text-mono-xs text-on-surface-variant opacity-60">SECURE CONNECTION ESTABLISHED</p>
</div>
</main>
</body></html>
