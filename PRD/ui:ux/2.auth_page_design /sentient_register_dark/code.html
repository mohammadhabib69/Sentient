<script>
        // Password Strength Logic
        function checkPasswordStrength(val) {
            const seg1 = document.getElementById('str-1');
            const seg2 = document.getElementById('str-2');
            const seg3 = document.getElementById('str-3');
            const seg4 = document.getElementById('str-4');
            const msg = document.getElementById('pwd-msg');

            // Reset
            seg1.className = 'strength-segment';
            seg2.className = 'strength-segment';
            seg3.className = 'strength-segment';
            seg4.className = 'strength-segment';
            
            if (!val) {
                msg.textContent = "Use at least 8 characters";
                msg.className = "font-mono-xs text-mono-xs text-outline-variant";
                return;
            }

            let strength = 0;
            if (val.length >= 8) strength++;
            if (val.match(/[A-Z]/)) strength++;
            if (val.match(/[0-9]/)) strength++;
            if (val.match(/[^A-Za-z0-9]/)) strength++;

            if (strength === 1) {
                seg1.classList.add('active-weak');
                msg.textContent = "Weak";
                msg.className = "font-mono-xs text-mono-xs text-error-red";
            } else if (strength === 2) {
                seg1.classList.add('active-medium');
                seg2.classList.add('active-medium');
                msg.textContent = "Fair";
                msg.className = "font-mono-xs text-mono-xs text-amber-alert";
            } else if (strength === 3) {
                seg1.classList.add('active-strong');
                seg2.classList.add('active-strong');
                seg3.classList.add('active-strong');
                msg.textContent = "Good";
                msg.className = "font-mono-xs text-mono-xs text-mist-teal";
            } else if (strength >= 4) {
                seg1.classList.add('active-strong');
                seg2.classList.add('active-strong');
                seg3.classList.add('active-strong');
                seg4.classList.add('active-strong');
                msg.textContent = "Strong";
                msg.className = "font-mono-xs text-mono-xs text-forest-green";
            }
        }

        // Particle Canvas Logic
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = `rgba(116, 149, 155, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();
    </script>
</body></html>
