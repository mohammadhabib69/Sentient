<body class="bg-surface-container text-on-surface min-h-screen flex flex-col justify-between overflow-x-hidden font-body-md relative">
<!-- Atmospheric Background Void (Layer 0) -->

<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[100px] opacity-50 mix-blend-screen"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[120px] opacity-40 mix-blend-screen"></div>
<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-20 mix-blend-overlay"></div>

<span class="material-symbols-outlined hover:text-primary transition-colors duration-200 cursor-pointer" data-icon="settings">settings</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter z-10 relative mt-[80px]">
<!-- Centered Glass Card -->
<div class="glass-panel w-full max-w-[480px] rounded-xl p-xl ambient-shadow glass-glow relative overflow-hidden group">
<!-- Subtle internal gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none rounded-xl"></div>
<div class="relative z-10">
<!-- Back Link -->
<a class="inline-flex items-center gap-2 text-mist-teal hover:text-on-surface transition-colors mb-lg font-body-sm text-body-sm" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>

                </a>
<!-- Lock Icon Glass Circle -->
<div class="w-16 h-16 rounded-full glass-panel flex items-center justify-center mb-lg border-primary-fixed/30 shadow-[0_0_15px_rgba(116,149,155,0.2)]" style="transform: translateY(2.62727px);">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<!-- Header Content -->
<h1 class="font-headline-2xl text-headline-2xl text-on-surface mb-xs">Reset your password</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-xl">Enter your email and we'll send you a reset link.</p>
<!-- Form -->
<form class="flex flex-col gap-lg">
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-mist-teal" for="email">EMAIL ADDRESS</label>
<div class="relative group/input">
<input class="w-full bg-surface-container-low text-on-surface font-metric-lg text-metric-lg px-md py-[14px] rounded-lg border border-[#2E3330] focus:border-mist-teal focus:ring-0 focus:outline-none transition-all duration-300 placeholder:text-outline-variant shadow-inner group-focus-within/input:shadow-[0_0_0_2px_rgba(116,149,155,0.18)]" id="email" name="email" placeholder="agent@sentient.ai" required="" type="email">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline-variant group-focus-within/input:text-mist-teal transition-colors pointer-events-none">mail</span>
</div>
</div>
<button class="w-full bg-forest-green hover:bg-forest-green/90 text-white font-headline-xl text-headline-xl py-md rounded-[10px] transition-all duration-200 mt-sm shadow-[0_4px_14px_rgba(73,119,107,0.4)] hover:shadow-[0_6px_20px_rgba(73,119,107,0.6)] active:scale-[0.98]" type="submit">

                    </button>

<script>
        // Optional micro-interaction: subtle floating animation for the lock icon
        const lockIcon = document.querySelector('.glass-panel .rounded-full');
        if(lockIcon) {
            let start = Date.now();
            function float() {
                let time = Date.now() - start;
                let y = Math.sin(time / 1000) * 3;
                lockIcon.style.transform = `translateY(${y}px)`;
                requestAnimationFrame(float);
            }
            float();
        }
    </script>
