<body class="bg-[#F5F7F6] text-[#1E201F] min-h-screen flex flex-col font-body-md overflow-hidden relative">
<!-- Ambient Background Effect -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-surface-tint/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-forest-green/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Container -->
<main class="flex-grow flex items-center justify-center p-md sm:p-xl z-10 relative">
<div class="w-full max-w-md bg-white rounded-2xl shadow-[0_24px_64px_rgba(0,0,0,0.08)] border border-black/5 overflow-hidden backdrop-blur-xl relative">
<!-- Progress Bar Top -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-variant/10">
<div class="h-full bg-forest-green w-[60%] transition-all duration-500 ease-out"></div>
</div>
<div class="p-xl sm:p-[3rem]">
<!-- Header -->
<div class="mb-lg">
<p class="font-label-caps text-label-caps text-surface-variant/60 uppercase mb-sm">Step 3 of 5</p>
<h1 class="font-headline-2xl text-headline-2xl text-[#1E201F] mb-sm">Create Workspace</h1>
<p class="font-body-md text-body-md text-surface-variant/80">Define the primary operating environment for your autonomous agents.</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<!-- Workspace Name Input -->
<div class="space-y-xs">
<label class="block font-body-sm text-body-sm font-medium text-[#1E201F]" for="workspace-name">Workspace Name <span class="text-error-red">*</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-surface-variant/50">dashboard</span>
<input class="w-full bg-[#F5F7F6] border border-black/10 rounded-lg py-3 pl-[3rem] pr-md font-body-md text-body-md text-[#1E201F] placeholder-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-mist-teal/50 focus:border-mist-teal transition-all" id="workspace-name" name="workspace-name" placeholder="e.g. Alpha Operations" required="" type="text"/>
</div>
</div>
<!-- Description Input -->
<div class="space-y-xs">
<label class="block font-body-sm text-body-sm font-medium text-[#1E201F]" for="workspace-description">Description <span class="text-surface-variant/50 font-normal">(Optional)</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-4 text-surface-variant/50">description</span>
<textarea class="w-full bg-[#F5F7F6] border border-black/10 rounded-lg py-3 pl-[3rem] pr-md font-body-md text-body-md text-[#1E201F] placeholder-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-mist-teal/50 focus:border-mist-teal transition-all resize-none" id="workspace-description" name="workspace-description" placeholder="Describe the purpose of this environment..." rows="3"></textarea>
</div>
</div>
<!-- Environment Type Selector (Bento Grid Style) -->
<div class="space-y-xs pt-sm">
<label class="block font-body-sm text-body-sm font-medium text-[#1E201F]">Environment Type</label>
<div class="grid grid-cols-2 gap-sm">
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" name="env-type" type="radio" value="production"/>
<div class="p-md rounded-xl border border-black/10 bg-[#F5F7F6] peer-checked:border-forest-green peer-checked:bg-forest-green/5 transition-all h-full flex flex-col justify-center items-center text-center gap-xs">
<span class="material-symbols-outlined text-surface-variant/60 group-hover:text-forest-green peer-checked:text-forest-green transition-colors">rocket_launch</span>
<span class="font-body-sm text-body-sm font-medium text-[#1E201F]">Production</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" name="env-type" type="radio" value="sandbox"/>
<div class="p-md rounded-xl border border-black/10 bg-[#F5F7F6] peer-checked:border-forest-green peer-checked:bg-forest-green/5 transition-all h-full flex flex-col justify-center items-center text-center gap-xs">
<span class="material-symbols-outlined text-surface-variant/60 group-hover:text-forest-green peer-checked:text-forest-green transition-colors">science</span>
<span class="font-body-sm text-body-sm font-medium text-[#1E201F]">Sandbox</span>
</div>
</label>
</div>
</div>
<!-- Actions -->
<div class="pt-xl mt-xl border-t border-black/5 flex items-center justify-between gap-md">
<button class="font-body-md text-body-md text-surface-variant hover:text-[#1E201F] transition-colors px-md py-2 flex items-center gap-sm" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">arrow_back</span>
                            Back
                        </button>
<button class="bg-forest-green text-white font-body-md text-body-md font-medium px-xl py-3 rounded-lg shadow-sm hover:bg-forest-green/90 active:scale-[0.98] transition-all flex items-center gap-sm" type="submit">
                            Continue
                            <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
</div>
</form>
</div>
</div>
