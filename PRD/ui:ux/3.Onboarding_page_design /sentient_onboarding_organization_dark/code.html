<style>

<body class="text-on-surface font-body-md flex items-center justify-center p-md">
<!-- Ambient Background Particles (Simulated) -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[20%] left-[10%] w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[20%] right-[10%] w-96 h-96 bg-forest-green/10 rounded-full blur-[120px]"></div>
</div>
<main class="w-full max-w-[640px] z-10 relative">
<!-- Onboarding Progress -->
<div class="mb-xl">
<div class="flex justify-between items-end mb-sm">
<div>
<h1 class="font-headline-2xl text-headline-2xl text-on-surface mb-xs">Create Organization</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Step 1 of 5: Initial Setup</p>
</div>
<div class="font-mono-xs text-mono-xs text-mist-teal">20% COMPLETED</div>
</div>
<!-- Progress Bar -->
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-mist-teal rounded-full relative w-1/5 shadow-[0_0_10px_rgba(116,149,155,0.5)]">
<div class="absolute inset-0 bg-white/20 animate-pulse"></div>
</div>
</div>
</div>
<!-- Main Form Card -->
<div class="glass-panel rounded-xl p-xl">
<form action="#" class="space-y-lg" method="POST">
<!-- Organization Name -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-sm" for="org-name">Organization Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant" style="font-variation-settings: 'FILL' 0;">business</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:border-mist-teal focus:ring-0 form-input-glow transition-all duration-200" id="org-name" name="org-name" placeholder="e.g. Acme Corp" type="text">
</div>
</div>
<!-- Industry & Team Size Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Industry -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-sm" for="industry">Industry</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pl-4 pr-10 text-on-surface focus:border-mist-teal focus:ring-0 form-input-glow transition-all duration-200" id="industry" name="industry">
<option disabled="" selected="" value="">Select Industry</option>
<option value="technology">Technology</option>
<option value="finance">Finance</option>
<option value="healthcare">Healthcare</option>
<option value="retail">Retail</option>
<option value="manufacturing">Manufacturing</option>
<option value="other">Other</option>
</select>
</div>
<!-- Team Size -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-sm" for="team-size">Team Size</label>
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 pl-4 pr-10 text-on-surface focus:border-mist-teal focus:ring-0 form-input-glow transition-all duration-200" id="team-size" name="team-size">
<option disabled="" selected="" value="">Select Size</option>
<option value="1-10">1 - 10</option>
<option value="11-50">11 - 50</option>
<option value="51-200">51 - 200</option>
<option value="201-500">201 - 500</option>
<option value="500+">500+</option>
</select>
</div>
</div>
<!-- Data Reference Link (Simulated component specific request) -->
<div class="flex items-start gap-3 p-md bg-surface-container/50 border border-glass-border rounded-lg mt-md">
<span class="material-symbols-outlined text-mist-teal mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<p class="font-body-sm text-body-sm text-on-surface">By continuing, you agree to our terms of service and establish the foundational intelligence environment for your team.</p>
</div>
</div>
<!-- Action Bar -->
<div class="pt-md mt-xl border-t border-glass-border flex justify-end">
<button class="bg-forest-green hover:bg-forest-green/90 text-white font-body-md text-body-md py-3 px-6 rounded-[10px] flex items-center gap-2 transition-all duration-200 active:scale-95 shadow-[0_4px_14px_rgba(73,119,107,0.4)]" type="submit">
                        Continue
                        <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
