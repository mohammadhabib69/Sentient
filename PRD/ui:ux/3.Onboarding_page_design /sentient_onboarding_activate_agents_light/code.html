<style>
        body {
            /* Forcing Light Mode look per prompt despite dark class requirement in instructions to balance constraints */
            background-color: #F5F7F6; 
            color: #121413;
        }
        .light-card {
            background-color: #FFFFFF;
            border: 1px solid rgba(116, 149, 155, 0.18);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

            border-color: #74959B;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .agent-selected {
            border-color: #49776B;
            background-color: #F0F5F4;
        }

            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(73, 119, 107, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(73, 119, 107, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(73, 119, 107, 0); }
        }

<body class="min-h-screen flex flex-col font-body-md antialiased overflow-x-hidden relative">
<!-- Atmospheric Background (Lightened) -->
<div class="fixed inset-0 z-[-1] pointer-events-none" style="background: radial-gradient(circle at 50% 0%, rgba(116, 149, 155, 0.05) 0%, transparent 70%);"></div>
<!-- Onboarding Header -->
<header class="w-full flex justify-between items-center px-lg py-md fixed top-0 z-50 bg-[#F5F7F6]/80 backdrop-blur-xl border-b border-glass-border">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-forest-green text-2xl">hexagon</span>
<span class="font-headline-xl text-headline-xl font-black text-mist-teal">Sentient</span>
</div>
<div class="flex items-center gap-md">
<span class="font-label-caps text-label-caps text-outline-variant">Step 4 of 5</span>
<div class="w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
<div class="h-full bg-forest-green rounded-full w-[80%] transition-all duration-1000 ease-out"></div>
</div>
<button class="text-on-surface-variant hover:text-forest-green transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>

<!-- Hero Section -->
<div class="text-center mb-xl w-full max-w-2xl">
<h1 class="font-headline-2xl text-headline-2xl text-[#121413] mb-sm">Activate AI Workforce</h1>
<p class="font-body-lg text-body-lg text-outline-variant">Select the specialized autonomous agents to deploy into your workspace. You can configure their specific parameters later.</p>
</div>
<!-- 2x2 Agent Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg w-full mb-2xl">
<!-- Agent 1: Aria -->
<button class="light-card rounded-xl p-lg text-left transition-all duration-300 group relative overflow-hidden flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-forest-green focus:ring-offset-2 focus:ring-offset-[#F5F7F6]" onclick="this.classList.toggle('agent-selected')">
<div class="absolute top-0 left-0 w-full h-[3px] bg-mist-teal"></div>
<div class="flex items-start justify-between mb-md">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center relative">
<span class="font-metric-lg text-metric-lg text-primary">AR</span>
<div class="absolute -right-1 -top-1 w-3 h-3 bg-secondary rounded-full pulse-glow"></div>
</div>
<div>
<h3 class="font-headline-xl text-body-lg font-semibold text-[#121413]">Aria</h3>
<span class="font-mono-xs text-mono-xs text-forest-green uppercase">Data Analyst</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-forest-green group-[.agent-selected]:text-forest-green">add_circle</span>
</div>
<p class="font-body-sm text-body-sm text-outline-variant mb-md flex-grow">Monitors operational metrics, identifies anomalies, and generates predictive forecasting models in real-time.</p>
<div class="bg-gray-50 rounded-lg p-sm border border-glass-border">
<p class="font-mono-xs text-mono-xs text-outline-variant">System Status: <span class="text-secondary">Ready to deploy</span></p>
</div>
</button>

<div class="absolute top-0 left-0 w-full h-[3px] bg-amber-alert"></div>
<div class="flex items-start justify-between mb-md">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center relative">
<span class="font-metric-lg text-metric-lg text-amber-alert">NV</span>
<div class="absolute -right-1 -top-1 w-3 h-3 bg-amber-alert rounded-full"></div>
</div>
<div>

</div>
<span class="material-symbols-outlined text-forest-green">check_circle</span>

<p class="font-mono-xs text-mono-xs text-outline-variant">System Status: <span class="text-forest-green">Selected</span></p>

<div class="absolute top-0 left-0 w-full h-[3px] bg-[#6366F1]"></div>
<div class="flex items-start justify-between mb-md">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center relative">
<span class="font-metric-lg text-metric-lg text-[#6366F1]">EC</span>
<div class="absolute -right-1 -top-1 w-3 h-3 bg-[#6366F1] rounded-full"></div>
</div>
<div>
<h3 class="font-headline-xl text-body-lg font-semibold text-[#121413]">Echo</h3>

<span class="material-symbols-outlined text-forest-green">check_circle</span>

<p class="font-body-sm text-body-sm text-outline-variant mb-md flex-grow">Handles tier-1 support queries, drafts routine communications, and schedules follow-ups automatically.</p>

<div class="absolute -right-1 -top-1 w-3 h-3 bg-secondary rounded-full pulse-glow"></div>
</div>

<h3 class="font-headline-xl text-body-lg font-semibold text-[#121413]">Flux</h3>
<span class="font-mono-xs text-mono-xs text-error-red uppercase">Systems Engineer</span>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-forest-green group-[.agent-selected]:text-forest-green">add_circle</span>

<p class="font-body-sm text-body-sm text-outline-variant mb-md flex-grow">Maintains integration health, deploys minor patches, and orchestrates resource allocation across nodes.</p>
<div class="bg-gray-50 rounded-lg p-sm border border-glass-border">

                Continue
