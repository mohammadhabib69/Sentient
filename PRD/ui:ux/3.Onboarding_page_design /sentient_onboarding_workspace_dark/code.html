<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sentient - Create Workspace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#333534",
                        "inverse-primary": "#436469",
                        "glass-border": "rgba(116, 149, 155, 0.18)",
                        "on-secondary": "#02382e",
                        "deep-forest": "#2C3D33",
                        "tertiary-fixed-dim": "#b8cbbd",
                        "primary-fixed": "#c6e9ef",
                        "on-primary-fixed": "#001f24",
                        "on-background": "#e2e3e0",
                        "error-red": "#C0504A",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#e2e3e0",
                        "surface-container-low": "#1a1c1b",
                        "on-primary": "#13353a",
                        "surface-container": "#1e201f",
                        "primary-container": "#75969c",
                        "on-secondary-container": "#8fbfb1",
                        "forest-green": "#49776B",
                        "background": "#121413",
                        "secondary-fixed": "#bbedde",
                        "outline": "#8b9293",
                        "inverse-on-surface": "#2f3130",
                        "surface-tint": "#aaccd3",
                        "on-tertiary-container": "#1d2d24",
                        "on-surface": "#e2e3e0",
                        "on-surface-variant": "#c1c8c9",
                        "surface": "#121413",
                        "tertiary": "#b8cbbd",
                        "error-container": "#93000a",
                        "on-tertiary": "#23342a",
                        "surface-container-high": "#282a29",
                        "on-tertiary-fixed-variant": "#394b40",
                        "tertiary-container": "#829589",
                        "surface-bright": "#383a38",
                        "on-primary-container": "#0a2e33",
                        "surface-dim": "#121413",
                        "mist-teal": "#74959B",
                        "surface-variant": "#333534",
                        "on-error": "#690005",
                        "glass-fill": "rgba(44, 61, 51, 0.45)",
                        "secondary-fixed-dim": "#a0d0c2",
                        "on-secondary-fixed-variant": "#1f4f44",
                        "outline-variant": "#414849",
                        "primary-fixed-dim": "#aaccd3",
                        "on-secondary-fixed": "#00201a",
                        "secondary-container": "#1f4f44",
                        "secondary": "#a0d0c2",
                        "surface-container-lowest": "#0d0f0e",
                        "tertiary-fixed": "#d4e7d9",
                        "on-tertiary-fixed": "#0e1f16",
                        "error": "#ffb4ab",
                        "amber-alert": "#D4874A",
                        "primary": "#aaccd3",
                        "on-primary-fixed-variant": "#2b4c51"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "sidebar-width": "240px",
                        "xs": "0.25rem",
                        "md": "1rem",
                        "lg": "1.5rem",
                        "sidebar-gap": "1rem",
                        "xl": "2rem",
                        "sm": "0.5rem",
                        "2xl": "4rem",
                        "gutter": "1.5rem",
                        "container-max": "1280px"
                    },
                    fontFamily: {
                        "label-caps": ["Geist", "sans-serif"],
                        "body-lg": ["Geist", "sans-serif"],
                        "hero-900": ["Geist", "sans-serif"],
                        "body-sm": ["Geist", "sans-serif"],
                        "mono-xs": ["JetBrains Mono", "monospace"],
                        "headline-xl": ["Geist", "sans-serif"],
                        "headline-2xl": ["Geist", "sans-serif"],
                        "body-md": ["Geist", "sans-serif"],
                        "metric-lg": ["JetBrains Mono", "monospace"]
                    },
                    fontSize: {
                        "label-caps": ["11px", { lineHeight: "1", letterSpacing: "0.1em", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "hero-900": ["72px", { lineHeight: "1.1", letterSpacing: "-0.04em", fontWeight: "900" }],
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        "mono-xs": ["11px", { lineHeight: "1", fontWeight: "400" }],
                        "headline-xl": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "headline-2xl": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
                        "body-md": ["15px", { lineHeight: "1.5", fontWeight: "400" }],
                        "metric-lg": ["18px", { lineHeight: "1", fontWeight: "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #1E201F;
            color: #e2e3e0;
            background-image: radial-gradient(circle at 50% 0%, rgba(116, 149, 155, 0.05) 0%, transparent 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Particle Background Simulation */
        .particle-field {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: drift 100s linear infinite;
        }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: -200px 200px; }
        }

        .glass-panel {
            background-color: rgba(30, 32, 31, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(116, 149, 155, 0.18);
            box-shadow: 0 24px 64px rgba(0,0,0,0.50);
        }

        .input-glass {
            background-color: #1A1C1B;
            border: 1px solid #2E3330;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            outline: none;
            border-color: #74959B;
            box-shadow: 0 0 0 2px rgba(116, 149, 155, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background-color: #49776B;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #3d6359;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="font-body-md text-body-md antialiased p-md">
<!-- Atmospheric Background -->
<div class="particle-field"></div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-lg mx-auto">
<!-- Brand / Header -->
<div class="text-center mb-xl">
<div class="font-headline-2xl text-headline-2xl font-black text-mist-teal mb-xs">Sentient</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Intelligence Engine Initialization</p>
</div>
<!-- Glass Card -->
<div class="glass-panel rounded-xl p-xl flex flex-col gap-lg relative overflow-hidden">
<!-- Progress Bar Top Accent -->
<div class="absolute top-0 left-0 h-1 bg-surface-variant w-full">
<div class="h-full bg-forest-green" style="width: 60%;"></div>
</div>
<!-- Content Header -->
<div class="flex flex-col gap-xs mt-sm">
<div class="flex items-center justify-between">
<span class="font-label-caps text-label-caps text-on-surface-variant">Step 3 of 5</span>
<span class="font-mono-xs text-mono-xs text-mist-teal">60%</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-surface">Create Workspace</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Define the functional domain for this cluster of agents.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-lg mt-sm">
<!-- Input Group: Name -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface flex items-center gap-xs" for="workspaceName">
                        Workspace Name
                        <span class="text-error-red">*</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">dashboard</span>
<input class="input-glass w-full rounded-lg h-12 pl-10 pr-md font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="workspaceName" placeholder="e.g., Engineering, Marketing, Operations" required="" type="text">
</div>
</div>
<!-- Input Group: Description -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface flex justify-between" for="workspaceDesc">
                        Description
                        <span class="font-mono-xs text-mono-xs text-outline-variant">Optional</span>
</label>
<textarea class="input-glass w-full rounded-lg p-md font-body-md text-body-md text-on-surface placeholder:text-outline-variant resize-none" id="workspaceDesc" placeholder="Briefly describe the primary objective of this workspace..." rows="3"></textarea>
</div>
<!-- Actions -->
<div class="flex items-center justify-between pt-md mt-sm border-t border-glass-border">
<button class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors flex items-center gap-xs" type="button">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                        Back
                    </button>
<button class="btn-primary rounded-[10px] h-12 px-lg font-body-md text-body-md font-medium flex items-center gap-sm" type="button">
                        Continue
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
