<style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        @keyframes reveal-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal {
            animation: reveal-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>

<body class="bg-background text-on-surface min-h-screen w-full flex flex-col items-center justify-center relative overflow-hidden font-sans">
<!-- Atmospheric Background (Depth Layer 0) -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-forest-green/15 via-background to-background opacity-80"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-secondary/5 rounded-full blur-[120px] mix-blend-screen" style="animation: pulse-glow 8s infinite ease-in-out;"></div>
</div>
<!-- Main Content Canvas (Suppressed Navigation for Success Splash) -->
<main class="relative z-10 w-full max-w-3xl px-md flex flex-col items-center gap-xl animate-reveal">
<!-- Progress Header -->
<div class="w-full max-w-lg space-y-3">
<div class="flex justify-between items-end font-mono-xs text-mono-xs text-secondary tracking-widest">
<span>STEP 5 OF 5</span>
<span>100%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden shadow-inner relative">
<!-- 100% Progress fill -->
<div class="absolute top-0 left-0 h-full w-full bg-secondary shadow-[0_0_10px_rgba(160,208,194,0.5)]"></div>
</div>
</div>
<!-- Success Glass Card (Depth Layer 2) -->
<div class="w-full bg-surface-container-low/40 backdrop-blur-2xl border border-glass-border p-12 rounded-2xl shadow-[0_24px_64px_rgba(0,0,0,0.50)] flex flex-col items-center gap-lg relative overflow-hidden" style="animation: float 6s infinite ease-in-out;">
<!-- Tech Accent Line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-secondary to-transparent opacity-70"></div>
<!-- Central Icon -->
<div class="relative w-28 h-28 flex items-center justify-center mt-sm">
<!-- Outer glowing rings -->
<div class="absolute inset-0 rounded-full border border-secondary/20 scale-[1.3] animate-[pulse-glow_4s_infinite_ease-in-out_reverse]"></div>
<div class="absolute inset-0 rounded-full border border-secondary/40 scale-[1.1] animate-[pulse-glow_3s_infinite_ease-in-out]"></div>
<!-- Main Glass Circle -->
<div class="w-full h-full rounded-full bg-forest-green/20 backdrop-blur-md border border-secondary/50 flex items-center justify-center shadow-[0_0_40px_rgba(73,119,107,0.4)] z-10">
<span class="material-symbols-outlined text-[56px] text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Typography & Messaging -->
<div class="text-center space-y-4 max-w-lg">
<h1 class="font-headline-2xl text-headline-2xl text-on-surface tracking-tight">Your reality engine is ready</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                    Aria and Flux have been successfully initialized. They are now actively monitoring and processing your organizational data streams in real-time.
                </p>
</div>
<!-- Feature Pills (Bento-style horizontal layout) -->
<div class="flex flex-wrap justify-center gap-md mt-sm w-full">
<div class="flex items-center gap-sm px-lg py-sm bg-surface-container/60 border border-glass-border rounded-full shadow-sm hover:bg-glass-fill hover:border-secondary/30 transition-all cursor-default">
<span class="material-symbols-outlined text-[16px] text-secondary">smart_toy</span>
<span class="font-mono-xs text-mono-xs text-on-surface">2 Agents Active</span>
</div>
<div class="flex items-center gap-sm px-lg py-sm bg-surface-container/60 border border-glass-border rounded-full shadow-sm hover:bg-glass-fill hover:border-secondary/30 transition-all cursor-default">
<span class="material-symbols-outlined text-[16px] text-secondary">dashboard</span>
<span class="font-mono-xs text-mono-xs text-on-surface">1 Workspace Created</span>
</div>
<div class="flex items-center gap-sm px-lg py-sm bg-surface-container/60 border border-glass-border rounded-full shadow-sm hover:bg-glass-fill hover:border-secondary/30 transition-all cursor-default">
<span class="material-symbols-outlined text-[16px] text-secondary">notifications_active</span>
<span class="font-mono-xs text-mono-xs text-on-surface">Team Notified</span>
</div>
</div>
<!-- Primary Action -->
<div class="w-full max-w-xs mt-lg">
<button class="w-full bg-forest-green hover:bg-forest-green/90 text-on-surface font-body-md text-body-md px-xl py-4 rounded-[10px] shadow-[0_8px_20px_rgba(73,119,107,0.25)] border border-white/10 transition-all duration-300 flex items-center justify-center gap-sm group">
                    Go to Dashboard
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1.5 transition-transform duration-300">arrow_forward</span>
</button>
</div>
</div>
